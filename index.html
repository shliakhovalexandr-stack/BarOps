<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<!-- Заборона авто-перекладу Chrome/браузера: застосунок завжди українською
     (інакше машинний переклад калічить — «Повар», «Солнце» замість «неділя» тощо) -->
<meta name="google" content="notranslate"/>
<title>BarOps</title>
<meta name="description" content="Розумний помічник для барменів: інвентаризація, накладні, списання"/>
<meta name="theme-color" content="#000000"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BarOps"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>

<!-- ── Fonts — Geist only ── -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- ── Shared styles ── -->
<link rel="stylesheet" href="shared/tokens.css"/>
<link rel="stylesheet" href="shared/components.css"/>
<link rel="stylesheet" href="shared/tab-bar.css"/>

<style>
/* ────────────────────────────
   HOST PAGE LAYOUT
──────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  /* без pull-to-refresh / overscroll-«стрибка» на рівні документа (Android APK/TWA) */
  overscroll-behavior: none;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

/* ── Aurora removed ── */
.aurora-blob { display: none; }

/* ────────────────────────────
   PHONE FRAME
──────────────────────────── */
#phone {
  position: relative; z-index: 1;
  width: var(--phone-w);
  background: #000;
  border-radius: var(--r-phone);
  border: 0.5px solid rgba(255,255,255,0.08);
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  height: 844px;
  overflow: hidden;
  animation: frameIn .5s var(--ease-spring) both;
}
@keyframes frameIn {
  from { opacity: 0; transform: translateY(18px) scale(.98); }
  to   { opacity: 1; transform: none; }
}

/* На мобільному — повний екран */
@media (max-width: 500px) {
  body { align-items: stretch; justify-content: flex-start; overflow: hidden; }
  #phone {
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    border: none;
    box-shadow: none;
    animation: none;
  }
  #app-status-bar { display: none; }
}

/* ────────────────────────────
   STATUS BAR
──────────────────────────── */
#app-status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px 6px;
  font-size: 11px;
  color: var(--text2);
  font-family: 'Geist', system-ui, sans-serif;
  font-weight: 500;
  letter-spacing: .02em;
  flex-shrink: 0;
}
#app-status-bar .status-bar__right {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ────────────────────────────
   VIEW CONTAINER
──────────────────────────── */
#app-view {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  /* зупиняємо «протікання» скролу в браузер: без pull-to-refresh і overscroll-пружини (Android APK/TWA) */
  overscroll-behavior: contain;
  display: flex;
  flex-direction: column;
  transition: opacity 250ms ease, transform 250ms ease;
}
#app-view::-webkit-scrollbar { width: 0; }

/* ────────────────────────────
   LOADING SCREEN
──────────────────────────── */
#app-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 20px;
}
.loading-logo-mark {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.loading-logo-wordmark {
  font-family: 'Geist', system-ui, sans-serif;
  font-weight: 600;
  font-size: 28px;
  letter-spacing: -0.045em;
  color: #fff;
  line-height: 1;
}
.loading-logo-wordmark span { color: #A88BFF; }
.loading-ring {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.08);
  border-top-color: #A88BFF;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--text2); letter-spacing: .06em;
}

/* ────────────────────────────
   ERROR SCREEN
──────────────────────────── */
.error-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; gap: 12px; padding: 32px;
  text-align: center;
}
.error-screen h2 { font-family: var(--font-h); font-size: 18px; color: var(--text0); }
.error-screen p  { font-size: 13px; color: var(--text2); font-family: var(--font-b); line-height: 1.6; }
</style>
</head>
<body>

<!-- Aurora background layer -->
<div class="aurora-blob aurora-blob--violet"></div>
<div class="aurora-blob aurora-blob--cyan"></div>
<div class="aurora-blob aurora-blob--pink"></div>

<!-- ══════════ PHONE FRAME ══════════ -->
<div id="phone">

  <!-- Status bar -->
  <div id="app-status-bar">
    <!-- Filled by app.js bootstrap() -->
    <span>21:34</span>
  </div>

  <!-- Main view container -->
  <div id="app-view">
    <!-- Loading state shown until first page renders -->
    <div id="app-loading">
      <div class="loading-logo-mark">
        <svg width="38" height="66" viewBox="0 0 52 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="18" y="1" width="16" height="9" rx="1.5" stroke="white" stroke-width="2" fill="none"/>
          <line x1="21" y1="4.5" x2="33" y2="4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="21" y1="7.5" x2="33" y2="7.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M18 10 h16 v10 c0 0 8 8 8 20 v40 a6 6 0 01-6 6 h-20 a6 6 0 01-6-6 V40 c0-12 8-20 8-20 V10" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
          <rect x="12" y="52" width="28" height="22" rx="4" fill="#A88BFF"/>
          <text x="26" y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="14" font-weight="800" fill="#0A0A14">B</text>
        </svg>
        <div class="loading-logo-wordmark">bar<span>ops.</span></div>
      </div>
      <div class="loading-ring"></div>
      <div class="loading-text">завантаження</div>
    </div>
  </div>

  <!-- Tab bar (hidden on auth, filled by app.js) -->
  <nav id="app-tab-bar" style="display:none">
    <!-- Filled by renderTabBar() in app.js -->
  </nav>

  <!-- Drawer wrap (manager only) -->
  <div id="app-drawer-wrap"></div>

  <!-- Постійні file inputs для камери/галереї (iOS Safari сумісність) -->
  <input type="file" id="ocr-cam-input" accept="image/*" capture="environment"
    style="position:fixed;top:-100px;left:-100px;opacity:0;width:1px;height:1px"
    onchange="if(window.__ocr&&this.files[0])window.__ocr.handleFile(this)"/>
  <input type="file" id="ocr-gallery-input" accept="image/*"
    style="position:fixed;top:-100px;left:-100px;opacity:0;width:1px;height:1px"
    onchange="if(window.__ocr&&this.files[0])window.__ocr.handleFile(this)"/>

</div><!-- /phone -->

<!-- ══════════ PAGE MODULES ══════════
     Кожна сторінка — ES-модуль.
     Вони самостійно реєструють себе через registerPage().
     Підключення — тут. Решта — в page-файлі.
     ══════════════════════════════════ -->
<script type="module">
  import { bootstrap, registerPage } from './shared/app.js';

  /*
   * Стратегія: eager import усіх сторінок паралельно.
   * Модулі невеликі (~10–20 КБ кожен), тому завантажуються
   * миттєво з локального сервера або CDN.
   * navigate() гарантовано отримає готовий модуль.
   */
  const [
    authMod, dashMod, ocrMod, invMod, woffMod,
    ordMod, recMod, alertMod, shiftMod, mgrMod, teamMod, profMod,
    exciseMod, debtsMod, analyticsMod, stockMod, venueEditMod, stopListMod, scheduleMod, journalMod,
    recipeBookMod, currentShiftMod, playlistMod, invoiceOcrMod, performanceMod, digestMod, disciplineMod,
    cashMod, myShiftMod, openTablesMod,
  ] = await Promise.all([
    import('./pages/auth.js'),
    import('./pages/dashboard.js'),
    import('./pages/ocr.js'),
    import('./pages/inventory.js'),
    import('./pages/writeoff.js'),
    import('./pages/ordering.js'),
    import('./pages/recipes.js'),
    import('./pages/price-alert.js'),
    import('./pages/shift-log.js'),
    import('./pages/manager.js'),
    import('./pages/team.js'),
    import('./pages/profile.js'),
    import('./pages/excise.js'),
    import('./pages/debts.js'),
    import('./pages/analytics.js'),
    import('./pages/stock.js'),
    import('./pages/venue-edit.js'),
    import('./pages/stop-list.js'),
    import('./pages/schedule.js'),
    import('./pages/journal.js'),
    import('./pages/recipe-book.js'),
    import('./pages/current-shift.js'),
    import('./pages/playlist.js'),
    import('./pages/invoice-ocr.js'),
    import('./pages/performance.js'),
    import('./pages/digest.js'),
    import('./pages/discipline.js'),
    import('./pages/cash.js'),
    import('./pages/my-shift.js'),
    import('./pages/open-tables.js'),
  ]);

  /* Реєструємо кожну сторінку — простий прямий об'єкт */
  const pages = [
    ['auth',        authMod],
    ['dashboard',   dashMod],
    ['ocr',         ocrMod],
    ['inventory',   invMod],
    ['writeoff',    woffMod],
    ['ordering',    ordMod],
    ['recipes',     recMod],
    ['price-alert', alertMod],
    ['shift-log',   shiftMod],
    ['manager',     mgrMod],
    ['team',        teamMod],
    ['profile',     profMod],
    ['excise',      exciseMod],
    ['debts',       debtsMod],
    ['analytics',   analyticsMod],
    ['stock',       stockMod],
    ['venue-edit',  venueEditMod],
    ['stop-list',   stopListMod],
    ['schedule',     scheduleMod],
    ['journal',      journalMod],
    ['recipe-book',  recipeBookMod],
    ['current-shift', currentShiftMod],
    ['playlist',      playlistMod],
    ['invoice-ocr',   invoiceOcrMod],
    ['performance',   performanceMod],
    ['digest',        digestMod],
    ['discipline',    disciplineMod],
    ['cash',          cashMod],
    ['my-shift',      myShiftMod],
    ['dishware',      invMod],
    ['open-tables',   openTablesMod],
  ];

  for (const [name, mod] of pages) {
    registerPage(name, mod.default);
  }

  /* Стартуємо додаток — перехід на 'auth' */
  bootstrap();
</script>

<script>
  /* Реєстрація Service Worker для PWA */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[SW] Зареєстровано:', reg.scope))
        .catch(err => console.log('[SW] Помилка:', err));
    });
  }
</script>

</body>
</html>
