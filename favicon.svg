<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="112" fill="#0A0A14"/>

  <!-- Bottle centered: original 52x90, scale 3.9, centered in 512x512 -->
  <!-- width: 52*3.9=202.8, height: 90*3.9=351 -->
  <!-- x offset: (512-202.8)/2 = 154.6, y offset: (512-351)/2 = 80.5 -->
  <g transform="translate(154, 80) scale(3.9)">
    <!-- Cap (boxy) + ridges -->
    <rect x="18" y="1" width="16" height="9" rx="1.5" stroke="white" stroke-width="2" fill="none"/>
    <line x1="19" y1="4.1" x2="33" y2="4.1" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="6.9" x2="33" y2="6.9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Body (rounded shoulders + bottom) -->
    <path d="M18 10 h16 v10 c0 0 8 8 8 20 v40 a6 6 0 01-6 6 h-20 a6 6 0 01-6-6 V40 c0-12 8-20 8-20 V10" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Label - violet -->
    <rect x="12" y="52" width="28" height="22" rx="4" fill="#A88BFF"/>
    <text x="26" y="68" text-anchor="middle"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
      font-size="14" font-weight="800" fill="#0A0A14">B</text>
  </g>
</svg>
